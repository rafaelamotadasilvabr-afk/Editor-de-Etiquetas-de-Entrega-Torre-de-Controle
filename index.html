<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TC Label Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="brand">
        <img src="logo-azulcargo.png" alt="Azul Cargo" onerror="this.style.display='none'">
        <div>
          <h1>TC Label Editor</h1>
          <p>Correção de endereço mantendo o layout da etiqueta original.</p>
        </div>
      </div>

      <label class="upload">
        <input id="fileInput" type="file" accept="image/*" />
        <span>Subir etiqueta original</span>
      </label>

      <div class="grid2">
        <label>AWB
          <input id="awb" placeholder="577-93126681" />
        </label>
        <label>Telefone
          <input id="telefone" placeholder="(00) 00000-0000" />
        </label>
      </div>

      <label>Destinatário
        <input id="destinatario" placeholder="Nome do destinatário" />
      </label>

      <label>Rua / Avenida
        <input id="rua" placeholder="Rua, avenida, travessa..." />
      </label>

      <div class="grid2">
        <label>Número
          <input id="numero" placeholder="330" />
        </label>
        <label>Complemento
          <input id="complemento" placeholder="Apto, bloco, referência..." />
        </label>
      </div>

      <div class="grid2">
        <label>Bairro
          <input id="bairro" placeholder="Bairro" />
        </label>
        <label>CEP
          <input id="cep" placeholder="00000-000" />
        </label>
      </div>

      <div class="grid2">
        <label>Cidade
          <input id="cidade" placeholder="Belo Horizonte" />
        </label>
        <label>UF
          <input id="uf" placeholder="MG" maxlength="2" />
        </label>
      </div>

      <label class="check">
        <input id="alerta" type="checkbox" checked />
        Incluir carimbo operacional para triagem/entregador
      </label>

      <details>
        <summary>Ajuste fino dos campos</summary>
        <p class="hint">Use se a etiqueta enviada tiver tamanho diferente. Valores em percentual da etiqueta.</p>
        <div id="positions" class="positions"></div>
      </details>

      <div class="actions">
        <button id="renderBtn">Atualizar etiqueta</button>
        <button id="downloadBtn">Baixar PNG</button>
        <button id="printBtn">Imprimir</button>
      </div>
    </section>

    <section class="previewWrap">
      <canvas id="canvas" width="377" height="594"></canvas>
      <p class="previewHint">A etiqueta corrigida será gerada sobre a imagem original.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
